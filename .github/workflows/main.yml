                                    <input type="range" id="altitude" min="0" max="500" value="100">
                                    <div class="value" style="text-align: center; width: 100%;">100</div>
                                </div>
                                <div class="slider-container">
                                    <label for="speed" style="text-align: center; width: 100%;">飞行速度 (m/s)</label>
                                    <input type="range" id="speed" min="0" max="20" value="10">
                                    <div class="value" style="text-align: center; width: 100%;">10</div>
