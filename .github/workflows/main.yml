                                    <input type="number" class="input-value" style="font-size: 20px; color:#87CEFA; width: 60px; text-align: center; border: 2px solid #87CEFA; background-color: transparent; border-radius: 5px;" value="450">
                                </div>
                        <div class="layer">
                            
							<button class="action" style="font-size: 16px; color:#87CEFA; background-color:transparent; border:0px solid #87CEFA; box-shadow: inset 0 0 0 2px #87CEFA;margin-left: 5px;">回退范围点</button>
							    <button class="action" style="font-size: 16px; color:#87CEFA; background-color:transparent; border:0px solid #87CEFA; box-shadow: inset 0 0 0 2px #87CEFA;margin-left: 5px;">导出航点</button>
							
                        </div>
                    </div>
                </div>
                
            
