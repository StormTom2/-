                    <div class="boxTitle2" style="width:26%; font-size: 1vw;color: #87CEFA;">地点搜索</div>
                    <div class="boxTitle2" style="width:26%; margin-left:22vw; margin-top: -1.3vw; font-size: 1vw;color: #87CEFA;">多模式设置</div>
                    <div class="boxTitle2" style="width:26%; margin-left:53vw; margin-top: -1.1vw; font-size: 1vw;color: #87CEFA;">气象数据</div>
                    
                    <div class="right_box">
