    <title>无人机授粉喷药管理平台</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/new_index.css">
    <style>
		
		
        
        .centerBox {
            width: 75%;
            margin-right: 15px;
            background: transparent;
        }

        .boxFont {
            font-size: 1.2vw;
        }

        .centerMainBox1 {
            width: 100%;
            height: 60.5%;
        }

        .centerMainBox2 {
            width: 100%;
            height: 38%;
            position: relative;
            margin-top: 15px;
        }

        .centerMainBox2 .first_border {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .boxTitle2 {
            width: 100%;
            height: 10%;
            font-size: .6vw;
            text-align: center;
            line-height: 10%;
            margin-top: 1vw;
            color: #87CEFA;
        }

        .contList {
            position: relative;
            width: 70%;
            height: 8vw;
            margin: 1vw auto 0;

        }

        .content1 li {
            display: none;
        }

        .baseBox {
            width: 100%;
            border: none;
            background: none;
        }

        .boxTitle {
            font-size: .8vw;
            width: 38%;
            margin-top: 1vw;
            text-align: center;
        }

        .right {
            float: right;
        }

        .baseBoxLeft {
            width: 30%;
            height: 95%;
            position: relative;
        }

        .baseBoxRight {
            width: 68%;
            height: 100%;
        }

        .baseBoxLeft .first_border {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }


        .baseBox1,
        .baseBox2,
        .baseBox3 {
            position: relative;
        }

        .baseBox1 .hardware,
        .baseBox2 img,
        .baseBox3 img {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .csbaseBox1 {
            position: relative;
            z-index: 999;
        }

        #canvas {
            display: block;
            margin: 0 auto;
            width: 10vw;
            height: 5vw;
        }

        .progress {
            position: relative;
        }

        .progress img {
            width: 12.5vw;
            height: 2vw;
            position: absolute;
            top: .4vw;
            right: -.2vw;
        }

        .progress .disease {
            position: absolute;
            top: .7vw;
            left: .5vw;
            color: #fff;
            font-size: .8vw;
        }

        .progress .similar {
            position: absolute;
            top: .8vw;
            left: 3vw;
            color: #87CEFA;
            font-size: .5vw;
        }

        /* 返回图标 */
        .navLeft {
            position: absolute;
            top: 5%;
            left: 35%;
            width: 3.5%;
            height: 8%;
            z-index: 999;
        }

        .navLeft>img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
