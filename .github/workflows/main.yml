                                <div class="value" style="font-size: 20px; color:#87CEFA; margin-left: 130px;">76</div>
                            </div>
                        </div>
                        <div class="layer">
                                    <div class="title" style="font-size: 24px; color:#87CEFA; display: inline-block;">云台角度</div>
                                    <input type="number" class="input-value" style="margin-left: 50px;font-size: 20px; color:#87CEFA; width: 60px; text-align: center; border: 2px solid #87CEFA; background-color: transparent; border-radius: 5px;" value="-45">
                                </div>
                                <div class="layer">
