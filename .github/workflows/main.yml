                            <button class="action" style="font-size: 16px; color:#87CEFA; background-color:transparent; border:0px solid #87CEFA; box-shadow: inset 0 0 0 2px #87CEFA;margin-left: 5px;">启用测距</button>
                            <button class="action" style="font-size: 16px; color:#87CEFA; background-color:transparent; border:0px solid #87CEFA; box-shadow: inset 0 0 0 2px #87CEFA;margin-left: 5px;">取消测距</button>
                        </div>
                        <div class="layer">
							<div style="text-align"> <!-- 容器样式，用于居中对齐和顶部填充 -->
