							            </div>
							            <div class="option-row">
							                <div class="option" onclick="toggleOption(event)"><div class="option-box"></div><span class="option-text">云台控制</span></div>
							                <div class="option" onclick="toggleOption(event)"><div class="option-box"></div><span class="option-text">实时传输</span></div>
							            </div>
							            <div class="option-row">
							                <div class="option" onclick="toggleOption(event)"><div class="option-box"></div><span class="option-text">夜间模式</span></div>
							                <div class="option" onclick="toggleOption(event)"><div class="option-box"></div><span class="option-text">地形匹配</span></div>
							            </div>
                            
                        </div>
                        <div class="weather_data">
