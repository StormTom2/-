<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机授粉喷药管理平台</title>
    <link rel="stylesheet" href="CSS/new_index.css">
</head>
<body>
    <div class="centerBox">
        <div class="boxFont">无人机授粉喷药管理平台</div>
        
        <div class="centerMainBox1">
            <nav>
                <ul>
                    <li>航线规划</li>
                    <li>实景检测</li>
                    <li>产品介绍</li>
                    <li>产品技术</li>
                    <li>成果展示</li>
                    <li>基础设置</li>
                </ul>
            </nav>
            
            <div class="map-selector">
                <button class="selected">百度地图</button>
                <button>高德地图</button>
                <button>卫星地图(必应)</button>
                <button>卫星天地图</button>
                <button>卫星地图(谷歌)</button>
            </div>
            
            <div class="hardware-selector">
                <select>
                    <option>Air3(12MP)</option>
                    <option>Air3(48MP)中长焦</option>
                    <option>站点 3</option>
                    <option>Air3S(12MP)</option>
                    <option>Air3S(50MP)</option>
                    <option>Mavic3Pro(20MP)</option>
                    <option>Mini4Pro(12MP)</option>
                    <option>Mini4Pro(48MP)</option>
                    <option>Mavic 3E</option>
                    <option>Matrice 4E</option>
                    <option>Mavic3E长焦(12MP)</option>
                    <option>Air2(12MP)</option>
                </select>
            </div>
            
            <div class="route-info">
                <div class="info-item">
                    <label>航迹长度（米）</label>
                    <span>998.4 m</span>
                </div>
                <div class="info-item">
                    <label>预计飞行时间</label>
                    <span>2 m 58 s</span>
                </div>
                <div class="info-item">
                    <label>航点数量（个）</label>
                    <span>4</span>
                </div>
                <div class="info-item">
                    <label>拍照数量（张）</label>
                    <span>66</span>
                </div>
            </div>
            
            <div class="flight-params">
                <div class="param-item">
                    <label>相对高度（m）</label>
                    <input type="number" value="100">
                </div>
                <div class="param-item">
                    <label>飞行速度 (m/s)</label>
                    <input type="number" value="10">
                </div>
            </div>
            
            <div class="search-section">
                <input type="text" placeholder="地点搜索">
                <button>搜索</button>
            </div>
        </div>
        
        <div class="centerMainBox2">
            <div class="first_border"></div>
            <div class="boxTitle2">多模式设置</div>
            
            <div class="options-grid">
                <div class="option-item" onclick="toggleOption(event)">航点简化模式</div>
                <div class="option-item" onclick="toggleOption(event)">正射航线</div>
                <div class="option-item" onclick="toggleOption(event)">路径优化</div>
                <div class="option-item" onclick="toggleOption(event)">高程跟随</div>
                <div class="option-item" onclick="toggleOption(event)">自动避障</div>
                <div class="option-item" onclick="toggleOption(event)">风速检测</div>
                <div class="option-item" onclick="toggleOption(event)">云台控制</div>
                <div class="option-item" onclick="toggleOption(event)">实时传输</div>
                <div class="option-item" onclick="toggleOption(event)">夜间模式</div>
                <div class="option-item" onclick="toggleOption(event)">地形匹配</div>
            </div>
            
            <div class="weather-data">
                <h3>气象数据</h3>
                <div class="weather-grid">
                    <div class="weather-item">
                        <label>温度</label>
                        <span>19℃</span>
                    </div>
                    <div class="weather-item">
                        <label>湿度</label>
                        <span>52%</span>
                    </div>
                    <div class="weather-item">
                        <label>风向</label>
                        <span>东南风</span>
                    </div>
                    <div class="weather-item">
                        <label>风速</label>
                        <span>2m/s</span>
                    </div>
                    <div class="weather-item">
                        <label>降雨量</label>
                        <span>0mm</span>
                    </div>
                    <div class="weather-item">
                        <label>蒸发量</label>
                        <span>0.326mm/h</span>
                    </div>
                    <div class="weather-item">
                        <label>气压</label>
                        <span>0.326MPa</span>
                    </div>
                </div>
            </div>
            
            <div class="hardware-display">
                <h3>硬件设备展示</h3>
                <div class="device-controls">
                    <div class="control-group">
                        <label>角度设置</label>
                        <div class="slider-container">
                            <label>航线角度</label>
                            <input type="range" min="0" max="360" value="0" class="slider">
                            <span class="slider-value">0</span>
                        </div>
                    </div>
                    <div class="control-group">
                        <button id="enable-measure">启用测距</button>
                        <button id="cancel-measure">取消测距</button>
                    </div>
                    <div class="control-group">
                        <div class="slider-container">
                            <label>航向重叠率</label>
                            <input type="range" min="0" max="100" value="74" class="slider">
                            <span class="slider-value">74</span>
                        </div>
                    </div>
                    <div class="control-group">
                        <div class="slider-container">
                            <label>旁向重叠率</label>
                            <input type="range" min="0" max="100" value="76" class="slider">
                            <span class="slider-value">76</span>
                        </div>
                    </div>
                    <div class="control-group">
                        <div class="slider-container">
                            <label>云台角度</label>
                            <input type="range" min="-90" max="30" value="0" class="slider">
                            <span class="slider-value">0</span>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>KMZ航点分割</label>
                        <input type="checkbox">
                    </div>
                    <div class="control-group">
                        <label>回退范围点</label>
                        <input type="number">
                    </div>
                    <div class="control-group">
                        <button>导出航点</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const sliders = document.querySelectorAll(".slider-container input[type='range']");
            sliders.forEach(slider => {
                const valueDisplay = slider.nextElementSibling;
                slider.addEventListener("input", function () {
                    valueDisplay.textContent = slider.value;
                });
            });
        });

        function toggleOption(event) {
            event.target.classList.toggle('selected');
        }
    </script>
</body>
</html>
